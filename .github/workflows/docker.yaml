name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - published

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check worker.py

      - name: Validate syntax
        run: python -c "import ast; [ast.parse(open(f).read()) for f in __import__('glob').glob('*.py')]"

  build-docker:
    needs: [test]
    if: github.event_name != 'release'
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false

  publish-latest-cpu:
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'published' && github.server_url != 'https://github.com'
    uses: l3tum/reusable-workflows/.github/workflows/publish-forgejo.yml@main
    runs-on: ubuntu-latest
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
  publish-cuda:
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'published' && github.server_url != 'https://github.com'
    uses: l3tum/reusable-workflows/.github/workflows/publish-forgejo.yml@main
    runs-on: ubuntu-latest
    with:
      BUILD_ARGS_JSON: |
        {
          "ONNX_RUNTIME": "cuda"
        }
      PUSH_LATEST: false
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
  publish-openvino:
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'published' && github.server_url != 'https://github.com'
    uses: l3tum/reusable-workflows/.github/workflows/publish-forgejo.yml@main
    runs-on: ubuntu-latest
    with:
      BUILD_ARGS_JSON: |
        {
          "ONNX_RUNTIME": "openvino"
        }
      PUSH_LATEST: false
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
  publish-rocm:
    needs: [test]
    if: github.event_name == 'release' && github.event.action == 'published' && github.server_url != 'https://github.com'
    uses: l3tum/reusable-workflows/.github/workflows/publish-forgejo.yml@main
    runs-on: ubuntu-latest
    with:
      BUILD_ARGS_JSON: |
        {
          "ONNX_RUNTIME": "rocm"
        }
      PUSH_LATEST: false
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}


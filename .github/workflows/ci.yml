# Doc-Worker CI/CD Pipeline (Forgejo Actions)
#
# This pipeline runs on every push and PR to the main branch.
# It performs:
# 1. Code quality checks (linting, type checking)
# 2. Unit tests
# 3. Docker image build
# 4. Security scanning

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # -----------------------------------------------------------------------
  # Code Quality
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: |
          ruff check .

      - name: Run Ruff formatter check
        run: |
          ruff format --check .

      - name: Run MyPy type checker
        run: |
          pip install -r requirements.txt
          mypy server/ --ignore-missing-imports

  # -----------------------------------------------------------------------
  # Unit Tests
  # -----------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: |
          pytest tests/ -v --cov=server --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -----------------------------------------------------------------------
  # Docker Build
  # -----------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: doc-worker:test
          build-args: ONNX_RUNTIME=cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-container \
            -e API_ENABLED=true \
            doc-worker:test
          sleep 10
          docker exec test-container python -c \
            "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
          docker stop test-container
          docker rm test-container

  # -----------------------------------------------------------------------
  # Security Scanning
  # -----------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "doc-worker:test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r server/ -ll

  # -----------------------------------------------------------------------
  # Deploy (only on main branch)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Registry
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.mortimer.website
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            registry.mortimer.website/l3tum/doc-worker:latest
            registry.mortimer.website/l3tum/doc-worker:cpu
            registry.mortimer.website/l3tum/doc-worker:${{ github.sha }}
          build-args: ONNX_RUNTIME=cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
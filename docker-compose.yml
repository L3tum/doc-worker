services:
  doc-worker:
    build:
      context: .
      args:
        # Runtime selection: "cpu" (default), "cuda", "openvino", or "rocm"
        #   cpu       — CPU-only (:latest/:cpu, smallest image, no GPU needed)
        #   cuda      — NVIDIA GPU (:cuda, CUDA 12.8.1 + cuDNN + onnxruntime-gpu)
        #   openvino  — Intel GPU/CPU (:openvino, experimental)
        #   rocm      — AMD GPU (:rocm, experimental)
        ONNX_RUNTIME: cpu
    # image: doc-worker       # use this if you pre-built the image
    container_name: doc-worker
    restart: unless-stopped
    volumes:
      # Worker staging directories
      - ./work/inbox:/work/inbox
      - ./work/processing:/work/processing
      - ./work/done:/work/done
      - ./work/error:/work/error
      - ./work/docling:/work/docling
      # Paperless consume directory (mount the same path Paperless uses)
      - ./paperless-consume:/paperless-consume
    ports:
      # API server port (for on-demand processing)
      - "8000:8000"
    environment:
      # Mode: "combined" (default), "folder", or "api"
      # - MODE=combined

      # OCR settings
      - OCR_LANG=deu

      # Runtime selection: "cpu", "cuda", "openvino", or "rocm"
      # Must match the ONNX_RUNTIME build arg used when building the image.
      # At runtime, the worker will auto-detect if the provider is available
      # and fall back to CPU if not.
      - OCR_RUNTIME=cpu

      # Processing mode: "auto" (default), "pp_ocr", or "paddle_vl"
      # - PROCESSING_MODE=auto

      # Polling
      - POLL_INTERVAL=5

      # Retry
      - MAX_RETRIES=3
      - RETRY_DELAY=10

      # File size limit (MB)
      - MAX_FILE_SIZE_MB=100

      # API settings
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_ENABLED=true

      # Logging
      - LOG_LEVEL=INFO
      - LOG_JSON=true

      # GPU passthrough (uncomment when using ONNX_RUNTIME=cuda)
      # deploy:
      #   resources:
      #     reservations:
      #       devices:
      #         - driver: nvidia
      #           count: 1
      #           capabilities: [gpu]

    # Docling is optional (legacy). Remove depends_on when fully migrated.
    # depends_on:
    #   docling:
    #     condition: service_started
    networks:
      - doc-worker-net

  # Docling API (legacy — being replaced by PaddleOCR-VL integration)
  # Uncomment when DOCLING_MODE is not "off"
  # docling:
  #   image: ghcr.io/ds4sd/docling-api:latest
  #   container_name: docling
  #   restart: unless-stopped
  #   ports:
  #     - "12000:12000"
  #   networks:
  #     - doc-worker-net

networks:
  doc-worker-net:
    driver: bridge
services:
  doc-worker:
    build:
      context: .
      args:
        # Runtime selection: "cpu" (default) or "cuda" (NVIDIA GPU)
        PADDLE_GPU: cpu
    # image: doc-worker       # use this if you pre-built the image
    container_name: doc-worker
    restart: unless-stopped
    ports:
      # FastAPI document understanding endpoint (for Open-WebUI)
      - "8000:8000"
    volumes:
      # Worker staging directories
      - ./work/inbox:/work/inbox
      - ./work/processing:/work/processing
      - ./work/done:/work/done
      - ./work/error:/work/error
      - ./work/docling:/work/docling
      # Paperless consume directory (mount the same path Paperless uses)
      - ./paperless-consume:/paperless-consume
    environment:
      # Docling API
      - DOCLING_BASE_URL=http://docling:12000
      - DOCLING_TIMEOUT=900          # 15 minutes for large documents

      # OCR settings
      - OCR_LANG=deu
      - OCR_USE_GPU=false

      # PaddleOCR-VL token (for Open-WebUI /layout-parsing auth)
      # Set to a secret value; Open-WebUI sends: Authorization: Bearer <value>
      # - PADDLEOCR_VL_TOKEN=your-secret-token

      # Polling
      - POLL_INTERVAL=5

      # Retry
      - MAX_RETRIES=3
      - RETRY_DELAY=10

      # GPU passthrough (uncomment when using PADDLE_GPU=cuda)
      # deploy:
      #   resources:
      #     reservations:
      #       devices:
      #         - driver: nvidia
      #           count: 1
      #           capabilities: [gpu]

    depends_on:
      docling:
        condition: service_started
    networks:
      - doc-worker-net

  docling:
    image: ghcr.io/ds4sd/docling-api:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "12000:12000"
    networks:
      - doc-worker-net

networks:
  doc-worker-net:
    driver: bridge

services:
  doc-worker:
    build:
      context: .
      args:
        # Runtime selection: "cpu" (default), "cuda", "openvino", or "rocm"
        #   cpu       — CPU-only (smallest image, no GPU needed)
        #   cuda      — NVIDIA GPU (CUDA 13.3.0 + onnxruntime-gpu)
        #   openvino  — Intel GPU/CPU (OpenVINO + onnxruntime-openvino)
        #   rocm      — AMD GPU (ROCm + onnxruntime-rocm)
        ONNX_RUNTIME: cpu
    # image: doc-worker       # use this if you pre-built the image
    container_name: doc-worker
    restart: unless-stopped
    volumes:
      # Worker staging directories
      - ./work/inbox:/work/inbox
      - ./work/processing:/work/processing
      - ./work/done:/work/done
      - ./work/error:/work/error
      - ./work/docling:/work/docling
      # Paperless consume directory (mount the same path Paperless uses)
      - ./paperless-consume:/paperless-consume
    environment:
      # Docling API
      - DOCLING_BASE_URL=http://docling:12000
      - DOCLING_TIMEOUT=900          # 15 minutes for large documents

      # OCR settings
      - OCR_LANG=deu

      # Runtime selection: "cpu", "cuda", "openvino", or "rocm"
      # Must match the ONNX_RUNTIME build arg used when building the image.
      # At runtime, the worker will auto-detect if the provider is available
      # and fall back to CPU if not.
      - OCR_RUNTIME=cpu

      # Polling
      - POLL_INTERVAL=5

      # Retry
      - MAX_RETRIES=3
      - RETRY_DELAY=10

      # GPU passthrough (uncomment when using ONNX_RUNTIME=cuda)
      # deploy:
      #   resources:
      #     reservations:
      #       devices:
      #         - driver: nvidia
      #           count: 1
      #           capabilities: [gpu]

    depends_on:
      docling:
        condition: service_started
    networks:
      - doc-worker-net

  docling:
    image: ghcr.io/ds4sd/docling-api:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "12000:12000"
    networks:
      - doc-worker-net

networks:
  doc-worker-net:
    driver: bridge

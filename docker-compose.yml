services:
  doc-worker:
    build:
      context: .
      args:
        # Runtime selection: "cpu" (default), "cuda", "openvino", or "rocm"
        #   cpu       — CPU-only (:latest/:cpu, smallest image, no GPU needed)
        #   cuda      — NVIDIA GPU (:cuda, CUDA 12.8.1 + cuDNN + onnxruntime-gpu)
        #   openvino  — Intel GPU/CPU (:openvino, experimental)
        #   rocm      — AMD GPU (:rocm, experimental)
        ONNX_RUNTIME: cpu
    # image: doc-worker       # use this if you pre-built the image
    container_name: doc-worker
    restart: unless-stopped
    volumes:
      # Worker staging directories
      - ./work/inbox:/work/inbox
      - ./work/processing:/work/processing
      - ./work/done:/work/done
      - ./work/error:/work/error
      - ./work/output:/work/output
      # Paperless consume directory (mount the same path Paperless uses)
      - ./paperless-consume:/paperless-consume
      # Model cache (optional — speeds up restarts)
      - paddle-model-cache:/root/.cache/modelscope
    ports:
      # API server port (for on-demand processing)
      - "8000:8000"
    environment:
      # OCR settings
      - OCR_LANG=deu

      # Runtime selection: "cpu", "cuda", "openvino", or "rocm"
      # Must match the ONNX_RUNTIME build arg used when building the image.
      - OCR_RUNTIME=cpu

      # Processing mode: "auto" (default), "pp_ocr", or "paddle_vl"
      # - auto: Use PP-OCR for text, PaddleOCR-VL for complex documents
      # - pp_ocr: Use only PP-OCRv6 (fast, text-only)
      # - paddle_vl: Use PaddleOCR-VL for full document understanding
      - PROCESSING_MODE=auto

      # PaddleOCR settings
      - PADDLE_OCR_LANG=ch
      - PADDLE_VL_MODEL=PaddleOCR-VL-1.5B
      - PADDLE_DEVICE=auto

      # Polling
      - POLL_INTERVAL=5

      # Retry
      - MAX_RETRIES=3
      - RETRY_DELAY=10

      # File size limit (MB)
      - MAX_FILE_SIZE_MB=100

      # API settings
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_ENABLED=true

      # Logging
      - LOG_LEVEL=INFO
      - LOG_JSON=true

    # GPU passthrough (uncomment when using ONNX_RUNTIME=cuda)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    networks:
      - doc-worker-net

networks:
  doc-worker-net:
    driver: bridge

volumes:
  paddle-model-cache:
    driver: local